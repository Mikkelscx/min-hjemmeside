    <!-- Brainstorm Container -->
    <div class="brainstorm-container">
        <!-- Connecting Lines SVG -->
        <svg class="connecting-lines" width="100%" height="100%" style="position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; overflow: visible;">
            <!-- Charcoal pencil texture filter - no blur for clear lines -->
            <defs>
                <filter id="charcoalTexture" x="-50%" y="-50%" width="200%" height="200%">
                    <feTurbulence baseFrequency="0.8" numOctaves="3" result="noise" type="fractalNoise"/>
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
                    <!-- Removed GaussianBlur for clarity -->
                    <feMerge>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            
            <!-- Only asset images - no hand-drawn lines -->
            
            <!-- BYENS LANDHANDEL line is created dynamically by JavaScript -->
            
            
            <!-- NATURLI' - using image asset linje 1.webp from brain (50%, 50%) to naturli' (top: 20%, right: 15%) - rotated to point toward upper right -->
            <image href="assets/linje 1.webp" xlink:href="assets/linje 1.webp" x="50%" y="50%" width="30%" height="400" transform="translate(0, -200) rotate(-40.6)" class="mindmap-line" preserveAspectRatio="none" opacity="1" style="display: block !important; visibility: visible !important; image-rendering: crisp-edges; filter: none !important;"></image>
            
            <!-- TWISTER line is created dynamically by JavaScript -->
            
            <!-- KØ-BAJER line is created dynamically by JavaScript -->
        </svg>
        <!-- Effects layer (behind brain) -->
        <div class="fart-layer" aria-hidden="true"></div>
        
        <!-- Brain -->
        <div class="brain">
            <svg viewBox="0 0 100 100" width="200" height="200" aria-label="Brain">
                <image href="assets/brain-cartoon.png" x="0" y="0" width="100" height="100" preserveAspectRatio="xMidYMid slice" />
                <!-- Eyes group for animation -->
                <g class="eyes-group">
                    <!-- Eyes (sclera) -->
                    <circle class="eye sclera left" cx="35" cy="45" r="6" fill="#fff"></circle>
                    <circle class="eye sclera right" cx="65" cy="45" r="6" fill="#fff"></circle>
                    <!-- Pupils -->
                    <circle class="pupil left" cx="35" cy="45" r="2.2" fill="#000"></circle>
                    <circle class="pupil right" cx="65" cy="45" r="2.2" fill="#000"></circle>
                </g>
                <!-- Wider smile -->
                <path class="brain-mouth" d="M38,58 Q50,61 62,58" stroke="#000" stroke-width="2" fill="transparent"></path>
            </svg>
        </div>
